<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>how it works</title>
<style>
  :root{
    --bg:#0A0E14;--bg-elev:#131A24;--bg-elev-2:#1B2330;
    --text:#E6EDF3;--muted:#7D8A9C;--faint:#4A5568;
    --accent:#2DD4BF;--accent-2:#8B7DF6;--grounded:#34D399;--alert:#F0637A;--warn:#F5B759;
    --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.14);
    --accent-wash:rgba(45,212,191,.14);--accent-2-wash:rgba(139,125,246,.16);
    --grounded-wash:rgba(52,211,153,.14);--alert-wash:rgba(240,99,122,.14);--warn-wash:rgba(245,183,89,.14);
    --mono:ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}*{box-sizing:border-box}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #c{position:relative;width:1920px;height:1080px;transform-origin:center;color:var(--text);font-family:var(--sans)}
  .card{position:absolute;left:96px;top:64px;width:1728px;height:952px;background:var(--bg-elev);
    border:1px solid var(--line);border-radius:20px;box-shadow:0 40px 120px rgba(0,0,0,.5);
    padding:40px 46px;opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
  .card.in{opacity:1;transform:none}
  .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .kick{font-family:var(--mono);font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .kick b{color:var(--accent)}
  .acc{font-family:var(--mono);font-size:15px;letter-spacing:.06em;color:var(--muted);background:var(--bg-elev-2);
    border:1px solid var(--line);padding:8px 13px;border-radius:8px}
  .cols{display:flex;gap:34px;height:812px}
  .left{width:560px;display:flex;flex-direction:column}
  .right{flex:1;display:flex;flex-direction:column}
  .lbl{font-family:var(--mono);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .lbl.clin{color:var(--accent)} .lbl.ai{color:var(--accent-2)}
  /* observation */
  .obs{background:var(--bg-elev-2);border:1px solid var(--line);border-radius:14px;padding:20px 22px;min-height:150px}
  .obs .cap{font-family:var(--mono);font-size:22px;line-height:1.5;color:var(--text)}
  .caret{display:inline-block;width:9px;height:22px;background:var(--accent);vertical-align:-3px;margin-left:1px;animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
  /* axes */
  .axes{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
  .chip{font-family:var(--mono);font-size:15px;color:var(--muted);background:rgba(45,212,191,.07);
    border:1px solid var(--line-2);border-radius:8px;padding:9px 13px;opacity:0;transform:translateY(8px) scale(.96);
    transition:all .45s var(--ease)}
  .chip.in{opacity:1;transform:none;color:var(--text)}
  /* hypotheses */
  .hyp{background:var(--bg-elev-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;
    display:flex;gap:16px;align-items:flex-start;opacity:0;transform:translateY(14px);transition:all .55s var(--ease)}
  .hyp.in{opacity:1;transform:none}
  .hid{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent-2);min-width:34px}
  .hbody{flex:1}
  .htxt{font-size:21px;line-height:1.4;color:var(--text);margin:0 0 12px}
  .hmeta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:14px;border-radius:999px;padding:7px 13px;border:1px solid}
  .pill.g{color:var(--grounded);background:var(--grounded-wash);border-color:rgba(52,211,153,.4)}
  .pill.n{color:var(--warn);background:var(--warn-wash);border-color:rgba(245,183,89,.4)}
  .pill svg{display:block}
  .cite{font-family:var(--mono);font-size:14px;color:var(--muted);border:1px dashed var(--line-2);border-radius:8px;padding:7px 12px;
    opacity:0;transition:all .4s var(--ease)}
  .cite.in{opacity:1} .cite.hot{color:var(--accent);border-color:var(--accent);border-style:solid;background:var(--accent-wash)}
  .cite b{color:var(--accent)}
  .stamp{position:absolute;font-family:var(--mono);font-size:15px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--warn);border:1.5px solid var(--warn);border-radius:8px;padding:6px 12px;opacity:0;transform:rotate(-7deg) scale(1.2);
    transition:all .5s var(--ease)}
  .stamp.in{opacity:1;transform:rotate(-7deg) scale(1)}
  .hyp.dim{opacity:.42;filter:saturate(.5)}
  .fals{font-family:var(--mono);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-2);
    opacity:0;transition:opacity .5s var(--ease);margin-left:8px}
  .fals.in{opacity:1}
  /* footer */
  .foot{position:absolute;left:46px;right:46px;bottom:30px;display:flex;align-items:center;justify-content:space-between;
    opacity:0;transform:translateY(10px);transition:all .5s var(--ease)}
  .foot.in{opacity:1;transform:none}
  .guard{display:flex;gap:10px}
  .gbadge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:15px;color:var(--grounded);
    background:var(--grounded-wash);border:1px solid rgba(52,211,153,.4);border-radius:999px;padding:9px 15px}
  .ships{font-family:var(--mono);font-size:17px;color:var(--muted)}
  .ships b{color:var(--grounded)} .ships s{color:var(--warn);text-decoration-color:var(--warn)}
  .good{font-family:var(--sans);font-size:20px;color:var(--grounded);opacity:0;transition:opacity .5s var(--ease)}
  .good.in{opacity:1}
</style></head>
<body>
<div id="stage"><div id="c">
  <div class="card" id="card">
    <div class="hd">
      <span class="kick">TransBench · <b>generate_experiment</b></span>
      <span class="acc">de-identified · research-only</span>
    </div>
    <div class="cols">
      <div class="left">
        <div class="lbl clin">Doctor's note — plain observation</div>
        <div class="obs"><span class="cap" id="obs"></span></div>
        <div class="lbl ai" style="margin-top:26px">Biological axes</div>
        <div class="axes" id="axes"></div>
      </div>
      <div class="right">
        <div class="lbl ai">Falsifiable hypotheses <span class="fals" id="fals">— each one you could prove wrong</span></div>
        <div id="hyps"></div>
      </div>
    </div>
    <div class="foot" id="foot">
      <div class="guard">
        <span class="gbadge">✓ secret-scanner</span>
        <span class="gbadge">✓ pre-push hook</span>
        <span class="gbadge">✓ grounded-only</span>
      </div>
      <div class="ships" id="ships">ships <b>2 grounded</b> · holds <s>1 unproven</s></div>
    </div>
  </div>
</div></div>
<script>
const W=1920,H=1080,c=document.getElementById('c');
const fit=()=>{c.style.transform='scale('+Math.min(innerWidth/W,innerHeight/H)+')';};
addEventListener('resize',fit);fit();
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const $=s=>document.querySelector(s);

const OBS="32F · lupus, still flaring despite standard drugs · reduced regulatory T-cells.";
const AXES=["regulatory T-cell dysfunction","autoimmune effector imbalance","treatment-refractory mechanism","epigenetic regulation","cytokine signaling","biomarker monitoring"];
const HYPS=[
 {id:"H1",txt:"FOXP3 TSDR hypermethylation destabilizes the Treg lineage.",grounded:false,n:0},
 {id:"H2",txt:"A cell-intrinsic STAT5 phosphorylation defect blunts IL-2 sensing in CD4+ Tregs.",grounded:true,n:3,pmid:"41677595",cite:"Unraveling the epigenetic regulation of Tregs"},
 {id:"H3",txt:"Reduced peripheral Tregs reflect sequestration into inflamed tissue, not a true deficit.",grounded:true,n:3,pmid:"41294856",cite:"Treg selectivity & stability"},
];
const CHK='<svg viewBox="0 0 24 24" width="15" height="15"><path d="M20 6 L9 17 L4 12" fill="none" stroke="#34D399" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function build(){
  const ax=$('#axes'); AXES.forEach(a=>{const e=document.createElement('span');e.className='chip';e.textContent=a;ax.appendChild(e);});
  const hy=$('#hyps');
  HYPS.forEach(h=>{
    const d=document.createElement('div');d.className='hyp';d.id='hyp-'+h.id;
    const pill=h.grounded?`<span class="pill g">${CHK} grounded · ${h.n} papers</span>`:`<span class="pill n">evidence not found · ${h.n} papers</span>`;
    const cite=h.pmid?`<span class="cite" id="cite-${h.id}">PMID <b>${h.pmid}</b> · ${h.cite}</span>`:'';
    d.innerHTML=`<div class="hid">${h.id}</div><div class="hbody"><p class="htxt">${h.txt}</p>
      <div class="hmeta">${pill}${cite}</div></div>`;
    if(!h.grounded){const s=document.createElement('div');s.className='stamp';s.id='stamp';s.textContent='not shipped';s.style.right='16px';s.style.top='-14px';d.appendChild(s);d.style.position='relative';}
    hy.appendChild(d);
  });
}
async function typeInto(el,t,per=26){el.innerHTML='';const cr=document.createElement('span');cr.className='caret';el.appendChild(cr);
  for(const ch of t){cr.insertAdjacentText('beforebegin',ch);await wait(per);}await wait(400);cr.remove();}

// Absolute scheduling (ms from beat start) — anchored to VO word times in sync_map.
function at(ms,fn){setTimeout(fn,ms);}
function play(){   // demo beat 93.61s, ~15.3s — tighter than draft 1
  build();
  at(120,   ()=>$('#card').classList.add('in'));
  at(1000,  ()=>typeInto($('#obs'),OBS,13));                                             // "paste" @94.6
  at(3600,  ()=>document.querySelectorAll('.chip').forEach((e,i)=>setTimeout(()=>e.classList.add('in'),i*70)));  // "angles" @99.9
  at(4900,  ()=>document.querySelectorAll('.hyp').forEach((e,i)=>setTimeout(()=>e.classList.add('in'),i*170)));  // "hypotheses" @101.2
  at(6000,  ()=>$('#fals').classList.add('in'));
  at(6800,  ()=>{document.querySelectorAll('.cite').forEach(e=>e.classList.add('in'));$('#cite-H2').classList.add('hot');}); // "clickable" @103.1
  at(8400,  ()=>{$('#cite-H2').classList.remove('hot');$('#hyp-H1').style.outline='1px solid var(--warn)';});    // "evidence isn't there" @104.7
  at(10800, ()=>{$('#stamp').classList.add('in');$('#hyp-H1').classList.add('dim');});   // "ships nothing" @107.1
  at(12000, ()=>$('#foot').classList.add('in'));                                         // "guardrails" @108.3
}
play();
</script>
</body></html>
