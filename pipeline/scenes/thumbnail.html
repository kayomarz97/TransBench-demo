<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>thumbnail</title>
<style>
  :root{--bg:#0A0E14;--bg-elev:#131A24;--text:#E6EDF3;--muted:#7D8A9C;--faint:#4A5568;
    --accent:#2DD4BF;--accent-2:#8B7DF6;--grounded:#34D399;--warn:#F5B759;
    --mono:ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}*{box-sizing:border-box}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #c{position:relative;width:1920px;height:1080px;transform-origin:center;color:var(--text);font-family:var(--sans);
    background:radial-gradient(1200px 800px at 78% 42%, rgba(139,125,246,.12), transparent 60%),
               radial-gradient(1000px 700px at 20% 70%, rgba(45,212,191,.10), transparent 60%), var(--bg)}
  .kick{position:absolute;top:96px;left:120px;font-family:var(--mono);font-size:30px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--muted)}
  .kick b{color:var(--accent)}
  .hook{position:absolute;top:150px;left:120px;font-family:var(--mono);font-size:26px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--warn);border:1px solid rgba(245,183,89,.5);border-radius:999px;padding:10px 20px;background:rgba(245,183,89,.08)}
  .title{position:absolute;top:278px;left:120px;width:1360px;font-weight:800;font-size:92px;line-height:1.08;letter-spacing:-.02em}
  .title .l1{color:var(--text)}
  .title .l2{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{position:absolute;top:690px;left:124px;width:1200px;font-family:var(--mono);font-size:32px;color:var(--muted)}
  .sub b{color:var(--text)}
  .brand{position:absolute;bottom:70px;left:124px;display:flex;align-items:center;gap:22px}
  .brand .wm{font-weight:800;font-size:54px;letter-spacing:-.01em;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .by{font-family:var(--mono);font-size:26px;color:var(--faint)}
  /* flask + data on the right */
  .art{position:absolute;right:150px;top:300px}
  .art svg{filter:drop-shadow(0 0 40px rgba(139,125,246,.35))}
</style></head>
<body><div id="stage"><div id="c">
  <div class="kick">Claude Science · <b>MCP connector</b></div>
  <div class="hook">Made with zero editing skills</div>
  <div class="title"><div class="l1">One sentence at</div><div class="l1">the bedside →</div><div class="l2">a testable experiment</div></div>
  <div class="sub">Grounded in <b>real papers</b>. Reproducible. <b>Built with Claude Code.</b></div>
  <div class="brand"><span class="wm">TransBench</span><span class="by">· one clinician · one command line</span></div>
  <div class="art">
    <svg width="360" height="440" viewBox="0 0 360 440">
      <g stroke="#8B7DF6" stroke-width="4" fill="none" stroke-linejoin="round">
        <path d="M150 40 L210 40 L210 150 L300 380 Q305 410 275 410 L85 410 Q55 410 60 380 L150 150 Z"/>
        <path d="M150 150 L210 150"/>
      </g>
      <path d="M92 360 L268 360" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round" opacity=".85"/>
      <g fill="#2DD4BF"><circle cx="150" cy="70" r="6"/><circle cx="170" cy="55" r="5"/><circle cx="188" cy="72" r="6"/></g>
      <g fill="#8B7DF6"><circle cx="205" cy="52" r="5"/><circle cx="220" cy="70" r="6"/><circle cx="235" cy="55" r="5"/></g>
      <g stroke="#34D399" stroke-width="3" opacity=".9"><path d="M40 15 h60" stroke-linecap="round"/><path d="M70 15 v40" stroke-linecap="round"/></g>
    </svg>
  </div>
</div></div>
</body></html>
